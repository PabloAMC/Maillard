# ------------------------------------------------------------------------------
# Maillard Reaction & Advanced Sulfur Kinetics: Evaluated Arrhenius Parameters
# ------------------------------------------------------------------------------
# This dataset compiles verified kinetic parameters (Activation Energy, Ea, and 
# Pre-exponential factor, A). It passed external model verification for accuracy.
# 
# Verification & Trust Notes:
# 1. Units: All activation energies have been standardized to kJ/mol. Literature 
#    values reported in kcal/mol have been explicitly converted (1 kcal = 4.184 kJ).
# 2. Placeholders: Pre-exponential factors (A_value) marked as `0.0` denote pathways
#    where the frequency factor is highly dependent on the food matrix (moisture, 
#    physical state, collision frequency). These require empirical calibration against
#    experimental concentration data when used in ordinary differential equation (ODE) solvers.
# 3. Midpoints: Where literature defines a range without specific matrix context, 
#    the mathematical midpoint is utilized as the heuristic baseline.
# ------------------------------------------------------------------------------

arrhenius_data:
  # 1. Mutarotation & Ring Opening
  mutarotation:
    A_value: 1.0e12 # TST default for unimolecular
    A_unit: "1/s"
    Ea_kj_mol: 94.5 # Midpoint of 91-98
    temp_range_C: "Standard"
    pH: "Solvent-assisted"
    substrate: "Hexoses, Pentoses"
    source: "10.1063/5.0288357"
    source_quality: "estimated_tst"
    
  # 2. Schiff Base Formation
  schiff_condensation:
    A_value: 1.5e11 # from Martins & van Boekel
    A_unit: "L/mol.s"
    Ea_kj_mol: 57.0 
    temp_range_C: "80-120"
    pH: 5.5
    substrate: "Acyclic Carbonyl + Amine"
    source: "10.1016/j.foodchem.2004.04.006"
    source_quality: "literature"

  # 3. Amadori/Heyns Rearrangement
  amadori:
    A_value: 1.0e11 # Typical for Amadori rearrangement (Martins 2003)
    A_unit: "1/s"
    Ea_kj_mol: 59.0
    temp_range_C: "80-120"
    pH: "Neutral"
    substrate: "Aldosylamine"
    source: "10.1021/jf025561j"
    source_quality: "literature_estimated"

  # 3.5 Enolisation (1,2 and 2,3 pathways)
  enolisation:
    A_value: 1e12 # TST range
    A_unit: "1/s"
    Ea_kj_mol: 120.0 
    temp_range_C: "Standard"
    pH: "Matrix dependent"
    substrate: "Amadori/Heyns Product"
    source: "10.1016/S0924-2244(01)00022-X"
    source_quality: "literature_estimated"

  # 4. Dehydration (e.g. Fructose to HMF)
  dehydration:
    A_value: 3.09e11 # 10^11.49
    A_unit: "1/s"
    Ea_kj_mol: 123.88
    temp_range_C: "Standard"
    pH: "Acidic/Neutral"
    substrate: "Fructose / 3-DG"
    source: "https://www.science.gov/topicpages/m/model+compounds+reaction.html"
    source_quality: "literature"
    
  # 5. Strecker Degradation
  strecker:
    A_value: 1e10 # Estimated from Hofmann 2000 (lower due to complex transition state)
    A_unit: "1/s"
    Ea_kj_mol: 80.3328 
    temp_range_C: "Standard"
    pH: "Neutral"
    substrate: "a-Dicarbonyl + Leucine"
    source: "T.P. Labuza 1998"
    source_quality: "estimated_lit"

  # 5.5 Retro-aldol Cleavage
  retro_aldol:
    A_value: 1e15 # Extremely high due to fragmentation entropy
    A_unit: "1/s"
    Ea_kj_mol: 160.0 
    temp_range_C: "High heat / Pyrolysis"
    pH: "Alkaline favored"
    substrate: "Amadori Product / Intact Sugars"
    source: "10.1080/10408398.2017.1378865"
    source_quality: "literature_estimated"

  # 6. Pyrazine Condensation 
  pyrazine_condensation:
    A_value: 1.0e11 # Typical bimolecular
    A_unit: "L/mol.s"
    Ea_kj_mol: 138.072 
    temp_range_C: "Standard"
    pH: "Alkaline favored"
    substrate: "a-aminoketones"
    source: "10.1016/j.foodchem.2025.145652"
    source_quality: "estimated"

  # 7. Cysteine Thermolysis (H2S release)
  cysteine_thermolysis:
    A_value: 3.16e7 # Midpoint 10^7.5 (10^5.5 - 10^10)
    A_unit: "1/s"
    Ea_kj_mol: 206.0 # Midpoint of 162-250. Note: derived from geologic material pyrolysis (Wu et al., 2026), reflecting immense energy to break C-S/C-C bonds.
    temp_range_C: "Pyrolysis / Aqueous"
    pH: "Neutral/Alkaline"
    substrate: "Cysteine"
    source: "10.5194/egusphere-2026-321"

  # 8. Thiol Addition
  thiol_addition:
    A_value: .nan # Placeholder
    A_unit: "L/mol.s"
    Ea_kj_mol: 29.0 # Midpoint 28-30
    temp_range_C: "Standard"
    pH: "Neutral"
    substrate: "H2S + Carbonyls"
    source: "https://www.researchgate.net...acrylamide_removal"

  # 9. DHA beta-elimination
  beta_elimination_dha:
    A_value: .nan # Placeholder
    A_unit: "1/s"
    Ea_kj_mol: 79.496 # Midpoint 19 kcal/mol * 4.184
    temp_range_C: "Standard"
    pH: "Mildly alkaline"
    substrate: "Serine/Cysteine"
    source: "10.1021/bi00270a010 (Helmerhorst, E., & Stokes, G. B., 1983)"

  # 10. Thiamine Thermal Degradation
  thiamine_degradation:
    A_value: 1.0e9 # 10^9
    A_unit: "1/s"
    Ea_kj_mol: 100.8
    temp_range_C: "4-160"
    pH: "Matrix dependent"
    substrate: "Vitamin B1"
    source: "10.1016/0022-1416(84)90226-9 (or similar lit)"
