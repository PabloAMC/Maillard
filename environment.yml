name: maillard
channels:
  - conda-forge
  - defaults
dependencies:
  # Core Python
  - python=3.11
  - pip

  # Molecular handling & cheminformatics
  - rdkit>=2023.09
  - networkx>=3.2

  # Semi-empirical QM screening (Tier 1)
  - xtb>=6.6        # GFN2-xTB via conda-forge
  - crest>=3.0      # Conformational search & explicit solvation
  - geometric      # Geometry optimization engine for PySCF

  # Atomistic simulation environment (glue layer)
  - ase>=3.23

  # Scientific Python stack
  - numpy>=1.26
  - scipy>=1.11
  - pandas>=2.1
  - matplotlib>=3.8
  - pyyaml>=6.0
  - tqdm>=4.66

  # PySCF for Tier 2 DFT (Skala XC functional)
  - pip:
    - pyscf>=2.4.0
    - pytest>=8.0
    # Microsoft Skala: deep-learning XC functional (chemical accuracy at DFT cost)
    - git+https://github.com/microsoft/skala.git

    # RMG-Py: automated reaction mechanism generator (Tier 0)
    # Install separately per RMG docs; listed here for documentation purposes
    # See: https://github.com/ReactionMechanismGenerator/RMG-Py
    # Requires: conda install -c rmg rmgpy rmg-database

    # Jupyter for analysis notebooks
    - jupyterlab>=4.0

    # Phase 10: MLP-Accelerated Geometry Optimization
    - torch>=2.0.0
    - mace-torch>=0.3.3
    - sella
    - cantera>=3.0
