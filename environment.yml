name: maillard
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pip
  - setuptools
  - pytest
  - hypothesis
  - numpy>=2.0
  - scipy
  - pandas
  - matplotlib
  - rdkit
  - cantera>=3.2.0
  - ase
  - pyscf
  - xtb
  - crest
  - geometric
  - sqlalchemy
  - pydantic>=2.0
  - pydantic-settings
  - pyyaml
  - optuna
  - tqdm
  - requests
  - diskcache
  - networkx
  - pytorch::pytorch=*=*cpu* # Forces the lightweight CPU version by default
  - pip:
      - sella
      - mace-torch
      - rxn-chem-utils
      - rxnmapper
      - huggingface_hub
      - orjson